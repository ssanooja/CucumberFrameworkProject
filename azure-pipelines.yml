# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
# ✅ Step 1: Checkout code
- checkout: self
  displayName: "Checkout source code"

# ✅ Step 2: Set up Java (Required for Selenium + Maven)
- task: JavaToolInstaller@1
  inputs:
    versionSpec: '25'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'
  displayName: "Install Java 25"

# ✅ Run Selenium + Cucumber tests
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean test'
    options: '-Dheadless=true'
  displayName: "Run Selenium BDD Tests"

# Install Allure CLI
- task: Bash@3
  displayName: "Install Allure CLI"
  inputs:
    targetType: 'inline'
    script: |
      curl -Ls -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz
      tar -zxvf allure.tgz
      sudo mv allure-2.32.0 /opt/allure

# Generate Allure Report ✅ FIXED
- task: Bash@3
  displayName: "Generate Allure Report"
  inputs:
    targetType: 'inline'
    script: |
      /opt/allure/bin/allure generate target/allure-results --clean -o target/allure-report

# Publish
- task: PublishPipelineArtifact@1
  displayName: "Publish Allure Report"
  inputs:
    targetPath: 'target/allure-report'
    artifact: 'AllureReport'