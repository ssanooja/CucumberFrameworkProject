# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: ubuntu-latest

variables:
  MAVEN_OPTS: "-Xmx1024m"
  ALLURE_VERSION: "2.25.0"

steps:
# ✅ Step 1: Checkout code
- checkout: self
  displayName: "Checkout source code"

# ✅ Step 2: Set up Java (Required for Selenium + Maven)
- task: JavaToolInstaller@1
  inputs:
    versionSpec: '25'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'
  displayName: "Install Java 11"

# ✅ Cache Maven dependencies
- task: Cache@2
  inputs:
    key: 'maven | "$(Agent.OS)" | **/pom.xml'
    path: ~/.m2/repository
  displayName: "Cache Maven dependencies"

# ✅ Run Selenium + Cucumber tests
- task: Maven@3
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean test'
    options: '-Dheadless=true'
  displayName: "Run Selenium BDD Tests"

# ✅ Install Allure CLI
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      curl -Ls -o allure.tgz https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
      tar -zxvf allure.tgz
      sudo mv allure-${ALLURE_VERSION} /opt/allure
      sudo ln -s /opt/allure/bin/allure /usr/bin/allure
  displayName: "Install Allure CLI"

# ✅ Generate Allure Report
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      allure generate target/allure-results --clean -o target/allure-report
  displayName: "Generate Allure Report"

# ✅ Publish Allure Report
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: 'target/allure-report'
    artifact: 'AllureReport'
  displayName: "Publish Allure Report"
